    <article class="page">
        <ol>

        <h1 class="sub-h1">design</h1>
        <div class="grid-container">
            <img src="image/design1.jpg" alt="写真1" data-title="ポスターデザイン" data-detail="オレンジリボン運動 ポスターデザインコンテスト2025応募作品"
            data-tools="CLIP STUDIO, Illustrator">
            <img src="image/design2.jpg" alt="写真2" data-title="パンフレットデザイン" data-detail="2024年度 造形デザイン学科パンフレットデザインコンペ応募作品
《学内で先生から賞をいただきました》"
            data-tools="Illustrator">
            <img src="image/design3.jpg" alt="写真3" data-title="グラフィックデザイン" data-detail="2024年度 奈良蚊帳織りふきんデザインコンテスト応募作品
《いいね賞をいただきました》"
            data-tools="CLIP STUDIO, Illustrator">
            <img src="image/design4.jpg" alt="写真4" data-title="カレンダーデザイン" data-detail="授業課題"
            data-tools="Illustrator, 透明水彩(イラスト)">
            <img src="image/design5.jpg" alt="写真5" data-title="パッケージデザイン" data-detail="2025年度 富山市パッケージデザインコンペティション応募作品"
            data-tools="Illustrator">
            <img src="image/design6.jpg" alt="写真6" data-title="ポスターデザイン" data-detail="授業課題 ギャラリーカフェの宣伝ポスター"
            data-tools="Illustrator, Photoshop">
            <img src="image/design7.jpg" alt="写真7" data-title="ポスターデザイン" data-detail="授業課題 架空の映画ポスター"
            data-tools="Photoshop, Illustrator">
            <img src="image/design8.jpg" alt="写真8" data-title="ステッカーデザイン" data-detail="2024年度シマフクロウステッカーデザインコンテスト応募作品"
            data-tools="CLIP STUDIO">
            <img src="image/design9.jpg" alt="写真9" data-title="ブックカバーデザイン" data-detail="2024年度グリーンリボンブックカバーデザインコンペ 応募作品"
            data-tools="CLIP STUDIO" >
        </div>

        <div class="modal" id="modal">
            <span class="close">&times;</span>
            <div class="modal-content-wrapper">
                <img class="modal-content" id="modal-img">
                <div id="modal-caption">
                    <h3 id="caption-title"></h3>
                    <p id="caption-detail"></p>
                    <p id="caption-tools" class="tools-text"></p>
                </div>
            </div>
        </div>
    </article>

    <footer>
        <small>
        <address>
            23133131@st.yasuda-u.ac.jp</address></small>
        <small>&copy; mitsunaga yuka 2026 All Rights Reserved.</small>
    </footer>

    <script>
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modal-img");
    const closeBtn = document.getElementsByClassName("close")[0];
    const images = document.querySelectorAll(".grid-container img");
    const capTitle = document.getElementById("caption-title");
    const capDetail = document.getElementById("caption-detail");
    const capTools = document.getElementById("caption-tools");

    images.forEach(img => {
        img.onclick = function() {
            modal.style.display = "flex";
            modalImg.src = this.src;
            capTitle.innerText = this.getAttribute("data-title") || "";
            capDetail.innerText = this.getAttribute("data-detail") || "";
            const tools = this.getAttribute("data-tools");
            capTools.innerText = tools ? "使用ツール： " + tools : "";
        }
    });

    closeBtn.onclick = function() {
        modal.style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

<script>
    const toggle = document.querySelector(".menu-toggle");
    const nav = document.querySelector(".nav-links");

    toggle.addEventListener("click", () => {
        nav.classList.toggle("show");
    });
</script>

</body>
</html>
