        <h1 class="sub-h1">contact</h1>
        <p>フォームによるお問い合わせについては、お時間をいただく可能性がございます。ご了承ください。</p>
        <p>以下のフォームにご記入の上、送信してください。</p>

        <form action="https://www.rescue.ne.jp/form/mail.cgi" method="POST">
            <input type="hidden" name="_uid" value="sF8AuNokqJyVBzMJ">
            <input type="hidden" name="_done" value="http://reirei67samu.stars.ne.jp/">
            <input type="hidden" name="_encode" value="utf8">
            <p>
                <label for="username">名前（必須）：
                    <input type="text" name="username" id="username" placeholder="全角で入力してください。" required class="form">
                </label>
            </p>
            <p>
                <label for="userfurigana">フリガナ（任意）：
                    <input type="text" name="userfurigana" id="userfurigana" placeholder="全角カタカナで入力してください。" required class="form">
                </label>
            </p>
            <p>
                <label for="usermail">メールアドレス（必須）：
                    <input type="text" name="usermail" id="usermail" placeholder="半角で入力してください。" required class="form">
                </label>
            </p>
            <p>
                <label for="usercomment">お問い合わせ内容（必須）：
                    <textarea name="usercomment" id="usercomment" placeholder="お問い合わせ内容を入力してください。"></textarea>
                </label>
            </p>
            <p>
                <button type="submit">送信</button>
            </p>
            <small>Powered by <a href="https://www.rescue.ne.jp/" target="_blank">CGI RESCUE</a>®</small>
            
        </form>
